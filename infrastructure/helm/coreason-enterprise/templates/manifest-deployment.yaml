apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-manifest
  labels:
    app: manifest
spec:
  replicas: {{ .Values.manifest.replicaCount }}
  selector:
    matchLabels:
      app: manifest
  template:
    metadata:
      labels:
        app: manifest
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manifest
          image: "{{ .Values.manifest.image.repository }}:{{ .Values.manifest.image.tag }}"
          imagePullPolicy: {{ .Values.manifest.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            {{- toYaml .Values.manifest.resources | nindent 12 }}
          env:
            - name: COREASON_ENVIRONMENT
              value: {{ .Values.global.environment }}
            - name: COREASON_NETWORK_MODE
              value: {{ .Values.global.networkMode | default "public" }}
