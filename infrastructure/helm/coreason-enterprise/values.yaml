global:
  environment: local # Options: 'local' (laptops) or 'production' (hyperscaler)

gateway:
  replicaCount: 1
  image:
    repository: ghcr.io/coreason/coreason-master-gateway
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 50m
      memory: 512Mi

runtime:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  image:
    repository: ghcr.io/coreason/coreason-runtime
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 100m
      memory: 1Gi

# Bare-Metal/Laptop OSS Fallbacks
# In 'production' these are disabled in favor of Managed Services (e.g. AWS RDS, Confluent Kafka)
neo4j:
  enabled: true
temporal:
  enabled: true
milvus:
  enabled: true
dex:
  enabled: true
