apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/component: frontend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: temporal
          image: temporalio/auto-setup:latest
          env:
            - name: CASSANDRA_SEEDS
              value: "cassandra"
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: "config/dynamicconfig/development.yaml"
          ports:
            - containerPort: 7233
              name: grpc
            - containerPort: 8233
              name: web
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/component: frontend
spec:
  ports:
    - port: 7233
      targetPort: 7233
      name: grpc
    - port: 8233
      targetPort: 8233
      name: web
  selector:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/component: frontend
