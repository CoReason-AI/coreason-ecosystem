apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: coreason-mesh-routing
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
    - "*"
  gateways:
    - coreason-gateway
  http:
    - match:
        - uri:
            prefix: /api/v1/telemetry
      route:
        - destination:
            host: telemetry-service
            port:
              number: 4317
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: coreason-runtime
            port:
              number: 8000
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ .Release.Namespace }}
spec:
  mtls:
    mode: STRICT
