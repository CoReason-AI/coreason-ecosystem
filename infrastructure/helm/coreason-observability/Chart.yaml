apiVersion: v2
name: coreason-observability
description: >-
  CoReason Observability Stack — a toggleable wrapper chart that deploys
  Prometheus, Grafana, and OpenTelemetry Collector for the CoReason platform.
  Enterprise clients with existing monitoring stacks can disable this chart
  entirely via the ArgoCD Application spec.
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.28.0-0"
home: https://coreason.ai
sources:
  - https://github.com/CoReason-AI/coreason-ecosystem
maintainers:
  - name: CoReason Engineering
    email: engineering@coreason.ai
    url: https://coreason.ai
icon: https://coreason.ai/assets/logo.png
keywords:
  - coreason
  - observability
  - prometheus
  - grafana
  - opentelemetry
  - monitoring
dependencies:
  - name: kube-prometheus-stack
    version: "72.*"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: opentelemetry-collector
    version: "0.*"
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: otelCollector.enabled
annotations:
  artifacthub.io/license: "Prosperity-3.0"
  artifacthub.io/signKey: "cosign"
  artifacthub.io/category: "monitoring-logging"
