version: '3.9'

services:
  postgres:
    image: postgres:15
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    networks:
      - swarm-mesh

  temporal:
    image: temporalio/auto-setup
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    healthcheck:
      test: [ "CMD-SHELL", "temporal operator cluster health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=
      - POSTGRES_SEEDS=postgres
      - BIND_ON_IP=0.0.0.0
    ports:
      - "7233:7233"
    networks:
      - swarm-mesh
      - sensory-gateway

  coreason-runtime:
    image: coreason-runtime:local
    build:
      context: ../../../coreason-runtime
      dockerfile: Dockerfile
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '${RUNTIME_CPUS:-2.0}'
          memory: '${RUNTIME_MEMORY:-4G}'
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import socket; s = socket.socket(); s.connect(('localhost', 8000))\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - EPISTEMIC_MERKLE_ROOT=${EPISTEMIC_MERKLE_ROOT}
    ports:
      - "8000:8000"
    networks:
      - swarm-mesh
      - sensory-gateway

  prometheus:
    image: prom/prometheus
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '1G'
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:9090/-/healthy || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-mesh

  grafana:
    image: grafana/grafana
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '1G'
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3000:3000"
    networks:
      - swarm-mesh

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9901/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "80:80"
    networks:
      - swarm-mesh
      - sensory-gateway
    depends_on:
      coreason-master-gateway:
        condition: service_healthy

  coreason-master-gateway:
    image: busybox:latest
    restart: on-failure
    command: ["sleep", "infinity"]
    deploy:
      resources:
        limits:
          cpus: '${GATEWAY_CPUS:-1.0}'
          memory: '${GATEWAY_MEMORY:-2G}'
    healthcheck:
      test: [ "CMD-SHELL", "exit 0" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - COREASON_NEO4J_URI=${COREASON_NEO4J_URI:-bolt://neo4j:7687}
      - COREASON_MILVUS_URI=${COREASON_MILVUS_URI:-http://milvus:19530}
      - COREASON_TREASURY_CONTRACT=${COREASON_TREASURY_CONTRACT}
    ports:
      - "8001:8000"
    networks:
      - swarm-mesh
      - sensory-gateway
    depends_on:
      coreason-runtime:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      milvus:
        condition: service_healthy

  nemoclaw:
    image: ghcr.io/nvidia/nemoclaw/sandbox-base:latest
    restart: on-failure
    command: ["sleep", "infinity"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    healthcheck:
      test: [ "CMD-SHELL", "exit 0" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8443:8443"
    networks:
      - swarm-mesh
      - sensory-gateway

  milvus:
    image: milvusdb/milvus:v2.3.0
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '4G'
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    networks:
      - swarm-mesh

  neo4j:
    image: neo4j:5.15.0
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    healthcheck:
      test: [ "CMD-SHELL", "wget http://localhost:7474/ -O - > /dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-none}
    volumes:
      - neo4j_data:/data
    ports:
      - "7687:7687"
      - "7474:7474"
    networks:
      - swarm-mesh

networks:
  swarm-mesh:
    internal: true
  sensory-gateway:

volumes:
  pg_data:
  milvus_data:
  neo4j_data:
