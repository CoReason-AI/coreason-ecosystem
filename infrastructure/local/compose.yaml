version: '3.9'

services:
  postgres:
    image: postgres:15
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    networks:
      - swarm-mesh

  temporal:
    image: temporalio/auto-setup
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    healthcheck:
      test: [ "CMD-SHELL", "temporal operator cluster health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=
      - POSTGRES_SEEDS=postgres
      - BIND_ON_IP=0.0.0.0
    ports:
      - "7233:7233"
    networks:
      - swarm-mesh
      - sensory-gateway

  coreason-runtime:
    image: ghcr.io/coreason-ai/coreason-runtime:0.39.0
    restart: on-failure
    command: ["start", "api", "--port", "8000"]
    deploy:
      resources:
        limits:
          cpus: '${RUNTIME_CPUS:-2.0}'
          memory: '${RUNTIME_MEMORY:-4G}'
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - EPISTEMIC_MERKLE_ROOT=${EPISTEMIC_MERKLE_ROOT}
    ports:
      - "8000:8000"
    networks:
      - swarm-mesh
      - sensory-gateway

  prometheus:
    image: prom/prometheus
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '1G'
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:9090/-/healthy || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-mesh

  grafana:
    image: grafana/grafana
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '1G'
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "3000:3000"
    networks:
      - swarm-mesh

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '1G'
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9901/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "80:80"
    networks:
      - swarm-mesh
      - sensory-gateway
    depends_on:
      coreason-master-gateway:
        condition: service_healthy

  vault:
    image: hashicorp/vault:latest
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root-token
      - VAULT_ADDR=http://127.0.0.1:8200
    command: >
      /bin/sh -c "
        vault server -dev -dev-listen-address=0.0.0.0:8200 &
        sleep 5
        vault secrets enable transit
        vault write -f transit/keys/coreason-merkle-key
        wait
      "
    ports:
      - "8200:8200"
    networks:
      - swarm-mesh
      - sensory-gateway
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5

  dex:
    image: ghcr.io/dexidp/dex:v2.38.0
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
    volumes:
      - ./dex-config.yaml:/etc/dex/config.docker.yaml:ro
    ports:
      - "5556:5556"
    networks:
      - swarm-mesh
      - sensory-gateway

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - swarm-mesh

  redpanda-connect:
    image: redpandadata/connect:latest
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '512M'
    volumes:
      - ./redpanda-connect-pipeline.yaml:/benthos.yaml:ro
    networks:
      - swarm-mesh
      - sensory-gateway

  coreason-master-gateway:
    build: ../..
    image: ghcr.io/coreason-ai/coreason-ecosystem:0.32.0
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '${GATEWAY_CPUS:-1.0}'
          memory: '${GATEWAY_MEMORY:-2G}'
    command: ["python", "-m", "http.server", "8000"]
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - COREASON_NEO4J_URI=${COREASON_NEO4J_URI:-bolt://neo4j:7687}
      - COREASON_MILVUS_URI=${COREASON_MILVUS_URI:-http://milvus:19530}
      - COREASON_TREASURY_CONTRACT=${COREASON_TREASURY_CONTRACT}
      - COREASON_OTLP_ENDPOINT=http://otel-collector:4318/v1/logs
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=root-token
    ports:
      - "8001:8000"
    networks:
      - swarm-mesh
      - sensory-gateway
    depends_on:
      coreason-runtime:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      milvus:
        condition: service_healthy
      vault:
        condition: service_healthy

  nemoclaw:
    image: ghcr.io/coreason-ai/nemoclaw:0.1.0
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8443/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8443:8443"
    networks:
      - swarm-mesh
      - sensory-gateway
    depends_on:
      openshell-server:
        condition: service_healthy

  openshell-server:
    image: ghcr.io/coreason-ai/coreason-ecosystem:0.32.0
    restart: on-failure
    command: ["python", "-m", "http.server", "8080"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8080:8080"
    networks:
      - swarm-mesh
      - sensory-gateway
    depends_on:
      openshell-driver:
        condition: service_healthy

  openshell-driver:
    image: ghcr.io/coreason-ai/coreason-ecosystem:0.32.0
    restart: on-failure
    command: ["python", "-m", "http.server", "8081"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8081:8081"
    networks:
      - swarm-mesh
      - sensory-gateway

  milvus:
    image: milvusdb/milvus:v2.3.0
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '4G'
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    networks:
      - swarm-mesh

  neo4j:
    image: neo4j:5.12
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '2G'
    healthcheck:
      test: [ "CMD", "neo4j", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-none}
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    ports:
      - "7687:7687"
      - "7474:7474"
    networks:
      - swarm-mesh

networks:
  swarm-mesh:
    internal: true
  sensory-gateway:

volumes:
  pg_data:
  milvus_data:
  neo4j_data:
