version: '3.9'

services:
  postgres:
    image: postgres:15
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - swarm-mesh

  temporal:
    image: temporalio/auto-setup
    depends_on:
      - postgres
    networks:
      - swarm-mesh

  coreason-runtime:
    build:
      context: ${COREASON_RUNTIME_PATH:-../../../coreason-runtime}
    image: coreason-runtime:local
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '4G'
    environment:
      - EPISTEMIC_MERKLE_ROOT=${EPISTEMIC_MERKLE_ROOT}
    ports:
      - "8000:8000"
    networks:
      - swarm-mesh
      - sensory-gateway

  prometheus:
    image: prom/prometheus
    networks:
      - swarm-mesh

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - swarm-mesh

networks:
  swarm-mesh:
    internal: true
  sensory-gateway:

volumes:
  pg_data:
