version: '3.9'

services:
  postgres:
    image: postgres:15
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - swarm-mesh

  temporal:
    image: temporalio/auto-setup
    depends_on:
      - postgres
    networks:
      - swarm-mesh

  coreason-runtime:
    image: ghcr.io/coreason/coreason-runtime:latest
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '4G'
    environment:
      - EPISTEMIC_MERKLE_ROOT=${EPISTEMIC_MERKLE_ROOT}
    ports:
      - "8000:8000"
    networks:
      - swarm-mesh
      - sensory-gateway

  prometheus:
    image: prom/prometheus
    networks:
      - swarm-mesh

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - swarm-mesh

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "80:80"
    networks:
      - swarm-mesh
      - sensory-gateway
    depends_on:
      - coreason-runtime

  milvus:
    image: milvusdb/milvus:v2.3.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    networks:
      - swarm-mesh

  neo4j:
    image: neo4j:5.12
    environment:
      NEO4J_AUTH: none
    volumes:
      - neo4j_data:/data
    ports:
      - "7687:7687"
      - "7474:7474"
    networks:
      - swarm-mesh

networks:
  swarm-mesh:
    internal: true
  sensory-gateway:

volumes:
  pg_data:
  milvus_data:
  neo4j_data:
