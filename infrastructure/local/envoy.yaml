static_resources:
  listeners:
  - name: ingress
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 80
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains: ["*"]
              routes:
              - match:
                  headers:
                  - name: ":authority"
                    string_match:
                      exact: "169.254.169.254"
                direct_response:
                  status: 403
                  body:
                    inline_string: "SSRF Attempt Blocked"
              - match:
                  headers:
                  - name: ":authority"
                    string_match:
                      safe_regex:
                        regex: ".*127\\.0\\.0\\..*"
                direct_response:
                  status: 403
                  body:
                    inline_string: "SSRF Attempt Blocked"
              - match:
                  prefix: "/"
                route:
                  cluster: coreason_master_gateway
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
  - name: coreason_master_gateway
    connect_timeout: 0.25s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: coreason_master_gateway
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: coreason-runtime
                port_value: 8000
