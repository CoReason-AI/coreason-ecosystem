# NATS Server Configuration for CoReason wasmCloud Lattice
#
# This configuration replaces custom httpx point-to-point networking
# with NATS Lattice — a self-forming, self-healing mesh (CNCF OSS).
#
# Architecture:
#   - JetStream enabled for durable messaging & state persistence
#   - Account-based isolation for multi-tenancy (replaces FederationProxy)
#   - Leaf node configuration for air-gap federation
#
# Copyright (c) 2026 CoReason, Inc. Licensed under the Prosperity Public License 3.0.

# --- Server Identity ---
server_name: coreason-nats-local

# --- Client Connections ---
port: 4222

# --- HTTP Monitoring ---
http_port: 8222

# --- JetStream (Durable State) ---
# Replaces Temporal RegistryStateWorkflow for registry state management.
# wadm uses JetStream for application manifest persistence.
jetstream {
    store_dir: "/data/jetstream"

    # Local development limits
    max_mem_store: 256MB
    max_file_store: 1GB
}

# --- Cluster Configuration ---
# In production, this enables multi-node NATS clustering.
# Locally, runs as a single node.
cluster {
    name: coreason-lattice
    port: 6222
}

# --- Leaf Nodes (Air-Gap Federation) ---
# Replaces FederationProxy (1,049 lines of custom Python code).
# Private instances connect as leaf nodes to the Public mesh.
leafnodes {
    port: 7422

    # In production, enable TLS via SPIFFE/SPIRE SVIDs:
    # tls {
    #     cert_file: "/etc/spiffe/certs/svid.pem"
    #     key_file: "/etc/spiffe/certs/svid-key.pem"
    #     ca_file: "/etc/spiffe/certs/bundle.pem"
    #     verify: true
    # }
}

# --- Authorization (Multi-Tenancy) ---
# Replaces custom JWT middleware in master_mcp.py.
# Each CoReason tenant maps to a NATS account with isolated subject namespaces.
accounts {
    # The CoReason Public Mesh account
    COREASON_PUBLIC {
        jetstream: enabled

        users: [
            { user: "wasmcloud-host", password: "dev-password-change-in-prod" }
            { user: "gateway-provider", password: "dev-password-change-in-prod" }
        ]

        # Subject permissions for the wasmCloud lattice
        # wasmCloud uses these subject patterns for lattice communication
        exports: [
            { stream: "wasmbus.>" }
            { stream: "wadm.>" }
            { service: "coreason.capability.>" }
        ]
    }

    # Isolated account for federated Private instances
    COREASON_FEDERATION {
        jetstream: enabled

        users: [
            { user: "federation-leaf", password: "dev-password-change-in-prod" }
        ]

        imports: [
            # Private instances can only access explicitly exported capabilities
            { stream: { account: COREASON_PUBLIC, subject: "coreason.capability.>" } }
        ]
    }

    # System account for NATS internal operations
    SYS {}
}

system_account: SYS

# --- Logging ---
debug: false
trace: false
logtime: true
