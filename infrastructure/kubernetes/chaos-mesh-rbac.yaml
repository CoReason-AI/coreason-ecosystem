apiVersion: v1
kind: ServiceAccount
metadata:
  name: coreason-chaos-effector
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coreason-chaos-effector-role
  namespace: default
rules:
  - apiGroups: ["chaos-mesh.org"]
    resources:
      - networkchaos
      - podchaos
      - timechaos
      - stresschaos
      - iochaos
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coreason-chaos-effector-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: coreason-chaos-effector
    namespace: default
roleRef:
  kind: Role
  name: coreason-chaos-effector-role
  apiGroup: rbac.authorization.k8s.io
