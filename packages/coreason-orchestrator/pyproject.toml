[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coreason-orchestrator"
version = "0.0.1"
description = "Core Orchestrator for CoReason Ecosystem"
requires-python = ">=3.14"
dependencies = [
    "coreason-manifest",
]

[tool.hatch.build.targets.wheel]
packages = ["src/coreason_orchestrator"]
