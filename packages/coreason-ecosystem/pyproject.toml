[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "coreason_ecosystem"
dynamic = ["version"]
description = "The CoReason AI Swarm Ecosystem Integration Wrapper"
readme = "README.md"
requires-python = ">=3.14"
authors = [
    { name = "Gowtham A Rao", email = "gowtham.rao@coreason.ai" },
]
# NOTE: These are the pip-installable boundaries of the ecosystem.
dependencies = [
    "coreason_manifest",
    # "coreason_orchestrator", # Uncomment when published
    # "coreason_inference",    # Uncomment when published
    # "coreason_actuator",     # Uncomment when published
    "click>=8.1.7",
    "loguru>=0.7.2",
]
license = { file = "LICENSE" }
classifiers = [
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
]

[project.scripts]
coreason = "coreason_ecosystem.cli:main"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.14.14",
    "pre-commit>=4.5.1",
    "mypy>=1.19.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/coreason_ecosystem"]

[tool.hatch.version]
source = "vcs"

[tool.hatch.version.raw-options]
root = "../.."
