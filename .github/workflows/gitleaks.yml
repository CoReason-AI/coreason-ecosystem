name: Gitleaks Secret Scan

on:
  push:
    branches: [ main, coreason-develop ]
  pull_request:
    branches: [ main, coreason-develop ]
  workflow_dispatch:

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gitleaks:
    name: Gitleaks Secret Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@c95a14d0e5bab51a9f56296a4eb0e416910cd350 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        run: |
          VERSION="8.18.2"
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz
          tar -zxvf gitleaks_${VERSION}_linux_x64.tar.gz gitleaks
          ./gitleaks detect --verbose --redact
        shell: bash
