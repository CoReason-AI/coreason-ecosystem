name: Deploy Documentation
on:
  push:
    branches:
      - main
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1
        with:
          enable-cache: false
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version-file: "pyproject.toml"
      - name: Install system dependencies (for temporalio source build)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Deploy MkDocs
        run: uv run mkdocs gh-deploy --force


