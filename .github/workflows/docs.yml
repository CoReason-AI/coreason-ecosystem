name: Deploy Documentation
on:
  push:
    branches:
      - main
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Extract coreason-manifest version
        run: |
          python -c "import re; m = re.search(r'coreason-manifest==([0-9]+\.[0-9]+\.[0-9]+)', open('pyproject.toml').read()); print('MANIFEST_VERSION=v' + m.group(1)) if m else exit(1)" >> "$GITHUB_ENV"
        shell: bash

      - name: Checkout coreason-manifest
        uses: actions/checkout@v6.0.2
        with:
          repository: CoReason-AI/coreason-manifest
          ref: ${{ env.MANIFEST_VERSION }}
          path: coreason-manifest
          token: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          fetch-tags: true
      - name: Link coreason-manifest as sibling
        run: python -c "import os, shutil; src=os.path.abspath('coreason-manifest'); dst=os.path.abspath('../coreason-manifest'); (os.remove(dst) if os.path.islink(dst) else (shutil.rmtree(dst) if os.path.isdir(dst) else os.remove(dst))) if (os.path.exists(dst) or os.path.islink(dst)) else None; os.symlink(src, dst, target_is_directory=True)"
        shell: bash
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1
        with:
          enable-cache: false
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version-file: "pyproject.toml"
      - name: Install system dependencies (for temporalio source build)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Deploy MkDocs
        run: uv run mkdocs gh-deploy --force
