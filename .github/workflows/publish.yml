name: Release

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  pages: write
  # attestations: write # Requires Enterprise Cloud or public repo for SLSA provenance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"
          allow-prereleases: true

      - name: Install system dependencies (for temporalio source build)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
        shell: bash

      - name: Build Docs
        run: uv run zensical build
        shell: bash

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site/"

      - name: Build package
        run: uv build
        shell: bash



      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          attestations: false # Requires Enterprise Cloud or public repo

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./dist
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: >-
            dist/*.tar.gz
            dist/*.whl

      - name: Upload attestations to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.sigstore.json
            sbom.spdx.json

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
