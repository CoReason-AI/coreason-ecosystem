
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          allow-prereleases: true
      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
        shell: bash

  test-ubuntu:
    needs: [lint-and-audit]
    if: always() && needs.lint-and-audit.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14-dev", "3.14t-dev"]
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=coreason_ecosystem --cov-report=xml
        shell: bash

      - name: Build docs
        run: uv run zensical build
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

  test-extended:
    needs: [lint-and-audit]
    if: always() && needs.lint-and-audit.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.14-dev", "3.14t-dev"]
      exclude:
        # grpcio compilation fails on Windows/macOS for Python 3.14 freethreaded
        - os: windows-latest
          python-version: "3.14t-dev"
        - os: macos-latest
          python-version: "3.14t-dev"
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=coreason_ecosystem --cov-report=xml
        shell: bash

  reproducible-builds:
    name: Reproducible Builds (Determinism Verification)
    needs: [test-ubuntu, test-extended]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          allow-prereleases: true
      - name: Build wheel
        run: uv build
        shell: bash
      - name: Verify SHA256
        run: sha256sum dist/*.whl
        shell: bash
