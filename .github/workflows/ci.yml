name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TEMPORAL_CI_NAMESPACE: "coreason-ci-${{ github.run_id }}-${{ github.run_attempt }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Pre-Flight Workspace Purity
        run: sudo chown -R $(whoami):$(whoami) ${{ github.workspace }} || true

      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen
        shell: bash

      - name: Check code (Ruff)
        run: uv run ruff check .
        shell: bash

      - name: Format check (Ruff)
        run: uv run ruff format --check .
        shell: bash

      - name: Typecheck (Mypy)
        run: uv run mypy src/ tests/
        shell: bash

      - name: Audit dependencies (Deptry)
        run: uv run deptry src/
        shell: bash

      - name: Build docs
        run: uv run zensical build
        shell: bash

      - name: Substrate Purity Verification
        run: git clean -xfd -e .venv -e .uv_cache

  test-ubuntu:
    needs: [lint-and-audit]
    if: always() && needs.lint-and-audit.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.14", "3.14t"]
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Configure free-threading execution
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> "$GITHUB_ENV"
        shell: bash

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: gowthamrao
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Compose
        run: |
          docker compose -f infrastructure/local/compose.yaml up -d
        shell: bash

      - name: Install Temporal CLI
        uses: temporalio/setup-temporal@1059a504f87e7fa2f385e3fa40d1aa7e62f1c6ca # v0

      - name: Create Ephemeral Temporal Namespace
        run: |
          temporal operator namespace create -n $TEMPORAL_CI_NAMESPACE --address 127.0.0.1:7233 --retention 1
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml
        shell: bash
        env:
          TEMPORAL_ADDRESS: "127.0.0.1:7233"
          TEMPORAL_NAMESPACE: ${{ env.TEMPORAL_CI_NAMESPACE }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Container & Network Teardown (Always Execute)
        if: always()
        run: |
          if command -v temporal >/dev/null 2>&1; then
            temporal operator namespace delete -n $TEMPORAL_CI_NAMESPACE --address 127.0.0.1:7233 --yes || true
          fi
          if [ -f "infrastructure/local/compose.yaml" ]; then
            docker compose -f infrastructure/local/compose.yaml down -v || true
          fi
        shell: bash

  test-extended:
    needs: [test-ubuntu]
    if: always() && needs.test-ubuntu.result == 'success'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.14", "3.14t"]
        exclude:
          - os: windows-latest
            python-version: "3.14t"
          - os: macos-latest
            python-version: "3.14t"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Configure free-threading execution
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> "$GITHUB_ENV"
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml
        shell: bash

  reproducible-builds:
    name: Determinism Verification
    needs: [test-ubuntu, test-extended]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Build wheel (attempt 1)
        run: |
          export SOURCE_DATE_EPOCH=315532800
          uv build --out-dir dist1
          sha256sum dist1/*.whl | tee /tmp/hash1.txt
        shell: bash

      - name: Build wheel (attempt 2)
        run: |
          export SOURCE_DATE_EPOCH=315532800
          uv build --out-dir dist2
          sha256sum dist2/*.whl | tee /tmp/hash2.txt
        shell: bash

      - name: Verify deterministic build
        run: |
          HASH1=$(awk '{print $1}' /tmp/hash1.txt)
          HASH2=$(awk '{print $1}' /tmp/hash2.txt)
          echo "Build 1 SHA256: $HASH1"
          echo "Build 2 SHA256: $HASH2"
          if [ "$HASH1" != "$HASH2" ]; then
            echo "::error::CRITICAL: Non-deterministic build detected! Hashes do not match."
            exit 1
          fi
          echo "✅ Deterministic build verified. SHA256: $HASH1"
        shell: bash

      - name: Container & Network Teardown (Always Execute)
        if: always()
        run: |
          if command -v temporal >/dev/null 2>&1; then
            temporal operator namespace delete -n $TEMPORAL_CI_NAMESPACE --address 127.0.0.1:7233 --yes || true
          fi
          if [ -f "infrastructure/local/compose.yaml" ]; then
            docker compose -f infrastructure/local/compose.yaml down -v || true
          fi
        shell: bash
