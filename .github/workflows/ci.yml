name: CI (Hetzner Rollout)

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TEMPORAL_CI_NAMESPACE: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      COMPOSE_PROJECT_NAME: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      CI_RUN_ID: ${{ github.run_id }}
      PORT: 0
      UV_CACHE_DIR: ${{ github.workspace }}/.uv_cache
    steps:
      - name: Pre-Flight Workspace Purity
        run: sudo chown -R $(whoami):$(whoami) ${{ github.workspace }} || true
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> $GITHUB_PATH
        shell: bash
      - name: Substrate Purity Verification
        run: git clean -xfd -e .venv -e .uv_cache
      - name: Dynamic Ecosystem Sync
        run: if [ -f "pyproject.toml" ]; then uv sync --python 3.14.3 --all-extras --dev; fi
        shell: bash
      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> $GITHUB_PATH
        shell: bash
      - name: Provision Ephemeral Orchestration Isolation
        run: temporal operator namespace create -n $TEMPORAL_CI_NAMESPACE || true
        shell: bash
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
        shell: bash
      - name: Ruff Format Check
        run: uvx ruff format --check .
        shell: bash
      - name: Mypy Check
        run: uv run mypy src/ tests/
        shell: bash
      - name: Deptry Check
        run: uv run deptry src/
        shell: bash
      - name: Docs Link Validation
        uses: lycheeverse/lychee-action@f81112d0d2814ded911bd23e3beaa9dda9093915 # v2.1.0
        with:
          args: >-
            --exclude-loopback
            --exclude scorecard.dev
            --accept 200,204,301,429
            '*.md'
            'docs/**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate Registry Lock Integrity
        run: uv run python scripts/validate_registry_lock.py
        shell: bash
      - name: Teardown Ephemeral Orchestration Isolation
        if: always()
        run: temporal operator namespace delete -n $TEMPORAL_CI_NAMESPACE || true
        shell: bash

  security-sast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TEMPORAL_CI_NAMESPACE: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      COMPOSE_PROJECT_NAME: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      CI_RUN_ID: ${{ github.run_id }}
      PORT: 0
      UV_CACHE_DIR: ${{ github.workspace }}/.uv_cache
    steps:
      - name: Pre-Flight Workspace Purity
        run: sudo chown -R $(whoami):$(whoami) ${{ github.workspace }} || true
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> $GITHUB_PATH
        shell: bash
      - name: Substrate Purity Verification
        run: git clean -xfd -e .venv -e .uv_cache
      - name: Dynamic Ecosystem Sync
        run: if [ -f "pyproject.toml" ]; then uv sync --python 3.14.3 --all-extras; fi
        shell: bash
      - name: Bandit Security Scan
        run: uvx bandit -r src/ scripts/ tests/ -s B101,B106,B108,B404
        shell: bash

  test-ubuntu:
    needs: [lint-and-audit, security-sast]
    if: always() && needs.lint-and-audit.result == 'success' && needs.security-sast.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14-dev"]
    env:
      TEMPORAL_CI_NAMESPACE: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      COMPOSE_PROJECT_NAME: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      CI_RUN_ID: ${{ github.run_id }}
      PORT: 0
      UV_CACHE_DIR: ${{ github.workspace }}/.uv_cache
    steps:
      - name: Pre-Flight Workspace Purity
        run: sudo chown -R $(whoami):$(whoami) ${{ github.workspace }} || true
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> $GITHUB_PATH
        shell: bash
      - name: Substrate Purity Verification
        run: git clean -xfd -e .venv -e .uv_cache
      - name: Install System Dependencies
        run: for i in {1..10}; do sudo apt-get update && sudo apt-get install -y protobuf-compiler && break || sleep 15; done
        shell: bash
      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t-dev'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash
      - name: Dynamic Ecosystem Sync (standard)
        if: matrix.python-version != '3.14t-dev'
        run: if [ -f "pyproject.toml" ]; then uv sync --python 3.14.3 --all-extras --dev; fi
        shell: bash
      - name: Dynamic Ecosystem Sync (free-threaded, skip lancedb)
        if: matrix.python-version == '3.14t-dev'
        run: if [ -f "pyproject.toml" ]; then uv sync --python 3.14t --dev; fi
        shell: bash
      - name: Provision Ephemeral Orchestration Isolation
        run: temporal operator namespace create -n $TEMPORAL_CI_NAMESPACE || true
        shell: bash
      - name: Run tests
        run: uv run pytest --cov=coreason_ecosystem --cov-report=xml
        shell: bash
      - name: CLI Contract Drift Check
        run: |
          mkdir -p docs/snapshots
          uv run coreason-ecosystem --help > docs/snapshots/cli_snapshot.txt
          git diff --exit-code docs/snapshots/cli_snapshot.txt || (echo "::error::CRITICAL: CLI contract has drifted. Please commit the updated docs/snapshots/cli_snapshot.txt" && exit 1)
        shell: bash
      - name: Build docs
        run: uv run zensical build
        shell: bash
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1e68e0611db2136730979cd394747063d8985160 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
      - name: Teardown Ephemeral Orchestration Isolation
        if: always()
        run: temporal operator namespace delete -n $TEMPORAL_CI_NAMESPACE || true
        shell: bash

  test-extended:
    needs: [lint-and-audit, security-sast]
    if: always() && needs.lint-and-audit.result == 'success' && needs.security-sast.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14-dev"]
    env:
      TEMPORAL_CI_NAMESPACE: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      COMPOSE_PROJECT_NAME: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      CI_RUN_ID: ${{ github.run_id }}
      PORT: 0
      UV_CACHE_DIR: ${{ github.workspace }}/.uv_cache
    steps:
      - name: Pre-Flight Workspace Purity
        run: sudo chown -R $(whoami):$(whoami) ${{ github.workspace }} || true
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> $GITHUB_PATH
        shell: bash
      - name: Substrate Purity Verification
        run: git clean -xfd -e .venv -e .uv_cache
      - name: Install System Dependencies
        run: for i in {1..10}; do sudo apt-get update && sudo apt-get install -y protobuf-compiler && break || sleep 15; done
        shell: bash
      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t-dev'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash
      - name: Dynamic Ecosystem Sync (standard)
        if: matrix.python-version != '3.14t-dev'
        run: if [ -f "pyproject.toml" ]; then uv sync --python 3.14.3 --all-extras --dev; fi
        shell: bash
      - name: Dynamic Ecosystem Sync (free-threaded, skip lancedb)
        if: matrix.python-version == '3.14t-dev'
        run: if [ -f "pyproject.toml" ]; then uv sync --python 3.14t --dev; fi
        shell: bash
      - name: Provision Ephemeral Orchestration Isolation
        run: temporal operator namespace create -n $TEMPORAL_CI_NAMESPACE || true
        shell: bash
      - name: Run tests
        run: uv run pytest --cov=coreason_ecosystem --cov-report=xml
        shell: bash
      - name: Teardown Ephemeral Orchestration Isolation
        if: always()
        run: temporal operator namespace delete -n $TEMPORAL_CI_NAMESPACE || true
        shell: bash

  reproducible-builds:
    name: Reproducible Builds (Determinism Verification)
    needs: [test-ubuntu, test-extended]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      TEMPORAL_CI_NAMESPACE: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      COMPOSE_PROJECT_NAME: ci-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ strategy.job-index }}
      CI_RUN_ID: ${{ github.run_id }}
      PORT: 0
      UV_CACHE_DIR: ${{ github.workspace }}/.uv_cache
    steps:
      - name: Pre-Flight Workspace Purity
        run: sudo chown -R $(whoami):$(whoami) ${{ github.workspace }} || true
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> $GITHUB_PATH
        shell: bash
      - name: Substrate Purity Verification
        run: git clean -xfd -e .venv -e .uv_cache
      - name: Build wheel (attempt 1)
        run: |
          uv build --out-dir dist1
          sha256sum dist1/*.whl | tee /tmp/hash1.txt
        shell: bash
      - name: Build wheel (attempt 2)
        run: |
          uv build --out-dir dist2
          sha256sum dist2/*.whl | tee /tmp/hash2.txt
        shell: bash
      - name: Verify deterministic build
        run: |
          HASH1=$(awk '{print $1}' /tmp/hash1.txt)
          HASH2=$(awk '{print $1}' /tmp/hash2.txt)
          echo "Build 1 SHA256: $HASH1"
          echo "Build 2 SHA256: $HASH2"
          if [ "$HASH1" != "$HASH2" ]; then
            echo "::error::CRITICAL: Non-deterministic build detected! Hashes do not match."
            echo "  Attempt 1: $HASH1"
            echo "  Attempt 2: $HASH2"
            exit 1
          fi
          echo "✅ Deterministic build verified. SHA256: $HASH1"
        shell: bash
