
name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          allow-prereleases: true
      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
        shell: bash
      - name: Ruff Format Check
        run: uvx ruff format --check .
        shell: bash
      - name: Mypy Check
        run: uv run mypy src/ tests/
        shell: bash
      - name: Deptry Check
        run: uv run deptry src/
        shell: bash
      - name: Docs Link Validation
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --exclude-loopback
            --accept 200,204,301,429
            '*.md'
            'docs/**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-sast:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          allow-prereleases: true
      - name: Install dependencies
        run: uv sync --all-extras
        shell: bash
      - name: Bandit Security Scan
        run: uvx bandit -r src/ scripts/ tests/ -s B101,B404
        shell: bash

  test-ubuntu:
    needs: [lint-and-audit, security-sast]
    if: always() && needs.lint-and-audit.result == 'success' && needs.security-sast.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14-dev", "3.14t-dev"]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=coreason_ecosystem --cov-report=xml
        shell: bash

      - name: Build docs
        run: uv run zensical build
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

  test-extended:
    needs: [lint-and-audit, security-sast]
    if: always() && needs.lint-and-audit.result == 'success' && needs.security-sast.result == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.14-dev", "3.14t-dev"]
      exclude:
        # grpcio compilation fails on Windows/macOS for Python 3.14 freethreaded
        - os: windows-latest
          python-version: "3.14t-dev"
        - os: macos-latest
          python-version: "3.14t-dev"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV
        shell: bash

      - name: Install dependencies
        run: uv sync --all-extras --dev
        shell: bash

      - name: Run tests
        run: uv run pytest --cov=coreason_ecosystem --cov-report=xml
        shell: bash

  reproducible-builds:
    name: Reproducible Builds (Determinism Verification)
    needs: [test-ubuntu, test-extended]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@ff7abcd0c3c05ccf6adc123a8cd1fd4fb30fb493
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
          allow-prereleases: true

      - name: Build wheel (attempt 1)
        run: |
          uv build --out-dir dist1
          sha256sum dist1/*.whl | tee /tmp/hash1.txt
        shell: bash

      - name: Build wheel (attempt 2)
        run: |
          uv build --out-dir dist2
          sha256sum dist2/*.whl | tee /tmp/hash2.txt
        shell: bash

      - name: Verify deterministic build
        run: |
          HASH1=$(awk '{print $1}' /tmp/hash1.txt)
          HASH2=$(awk '{print $1}' /tmp/hash2.txt)
          echo "Build 1 SHA256: $HASH1"
          echo "Build 2 SHA256: $HASH2"
          if [ "$HASH1" != "$HASH2" ]; then
            echo "::error::CRITICAL: Non-deterministic build detected! Hashes do not match."
            echo "  Attempt 1: $HASH1"
            echo "  Attempt 2: $HASH2"
            exit 1
          fi
          echo "✅ Deterministic build verified. SHA256: $HASH1"
        shell: bash
