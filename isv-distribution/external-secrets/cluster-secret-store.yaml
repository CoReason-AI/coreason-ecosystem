#
# ClusterSecretStore Template — CoReason ISV Distribution
# =========================================================
# This template defines the ESO ClusterSecretStore that bridges your
# organization's secret backend into Kubernetes. CoReason ExternalSecret
# CRs reference this store by name.
#
# INSTRUCTIONS:
#   1. Choose your secret backend below (uncomment ONE provider block)
#   2. Configure the authentication method for your environment
#   3. Apply: kubectl apply -f cluster-secret-store.yaml
#   4. Verify: kubectl get clustersecretstore coreason-vault -o yaml
#
# Supported Backends:
#   - AWS Secrets Manager (recommended for EKS)
#   - HashiCorp Vault (recommended for multi-cloud / on-prem)
#   - GCP Secret Manager (recommended for GKE)
#   - Azure Key Vault (recommended for AKS)
#
# Prerequisites:
#   - External Secrets Operator installed in the cluster
#   - IAM / Workload Identity configured for the ESO service account
#
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: coreason-vault
  labels:
    app.kubernetes.io/part-of: coreason
    app.kubernetes.io/component: secret-management
spec:
  # ──────────────────────────────────────────────────────────────────────
  # OPTION A: AWS Secrets Manager (uncomment this block for EKS/AWS)
  # ──────────────────────────────────────────────────────────────────────
  # provider:
  #   aws:
  #     service: SecretsManager
  #     region: us-east-1                    # <-- Your AWS region
  #     auth:
  #       jwt:
  #         serviceAccountRef:
  #           name: external-secrets-sa      # <-- ESO ServiceAccount with IRSA
  #           namespace: external-secrets

  # ──────────────────────────────────────────────────────────────────────
  # OPTION B: HashiCorp Vault (uncomment this block for Vault)
  # ──────────────────────────────────────────────────────────────────────
  # provider:
  #   vault:
  #     server: "https://vault.example.com"  # <-- Your Vault address
  #     path: "secret"                       # <-- KV v2 mount path
  #     version: "v2"
  #     auth:
  #       kubernetes:
  #         mountPath: "kubernetes"
  #         role: "coreason-external-secrets" # <-- Vault K8s auth role
  #         serviceAccountRef:
  #           name: external-secrets-sa
  #           namespace: external-secrets

  # ──────────────────────────────────────────────────────────────────────
  # OPTION C: GCP Secret Manager (uncomment this block for GKE/GCP)
  # ──────────────────────────────────────────────────────────────────────
  # provider:
  #   gcpsm:
  #     projectID: "your-gcp-project-id"     # <-- Your GCP project
  #     auth:
  #       workloadIdentity:
  #         clusterLocation: us-central1     # <-- Your cluster region
  #         clusterName: your-cluster-name   # <-- Your GKE cluster name
  #         clusterProjectID: your-gcp-project-id
  #         serviceAccountRef:
  #           name: external-secrets-sa
  #           namespace: external-secrets

  # ──────────────────────────────────────────────────────────────────────
  # OPTION D: Azure Key Vault (uncomment this block for AKS/Azure)
  # ──────────────────────────────────────────────────────────────────────
  # provider:
  #   azurekv:
  #     tenantId: "your-azure-tenant-id"     # <-- Azure AD Tenant ID
  #     vaultUrl: "https://your-vault.vault.azure.net"  # <-- Key Vault URL
  #     authType: WorkloadIdentity
  #     serviceAccountRef:
  #       name: external-secrets-sa
  #       namespace: external-secrets

  # ──────────────────────────────────────────────────────────────────────
  # TEMPORARY: Dummy provider for validation (remove after configuring)
  # ──────────────────────────────────────────────────────────────────────
  provider:
    fake:
      data: []
  conditions:
    - namespaces:
        - coreason-system
        - argocd
