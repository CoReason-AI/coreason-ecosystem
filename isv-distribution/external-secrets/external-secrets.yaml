#
# ExternalSecret: CoReason OCI Registry Credentials
# ====================================================
# This manifest creates two Kubernetes Secrets via the External Secrets
# Operator (ESO), pulling credentials from your configured secret backend.
#
# Secrets Created:
#   1. coreason-registry-credentials (coreason-system) — Docker image pull secret
#   2. coreason-oci-helm-creds (argocd) — ArgoCD OCI Helm chart pull secret
#
# Prerequisites:
#   1. External Secrets Operator installed
#   2. ClusterSecretStore 'coreason-vault' configured and healthy
#   3. Secrets stored in your backend at the paths referenced below
#
# Required Secret Keys in Your Backend:
#   Path: coreason/oci-credentials (or equivalent for your provider)
#   Keys:
#     - username    (GitHub username or robot account)
#     - password    (GitHub PAT scoped to read:packages)
#     - email       (Contact email for the registry account)
#
# Apply:
#   kubectl apply -f external-secrets.yaml
#
---
# 1. Image Pull Secret — used by workload pods in coreason-system
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: coreason-registry-credentials
  namespace: coreason-system
  labels:
    app.kubernetes.io/part-of: coreason
    app.kubernetes.io/component: secret-management
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: coreason-vault
    kind: ClusterSecretStore
  target:
    name: coreason-registry-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "email": "{{ .email }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: coreason/oci-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: coreason/oci-credentials
        property: password
    - secretKey: email
      remoteRef:
        key: coreason/oci-credentials
        property: email
---
# 2. ArgoCD OCI Helm Repository Secret — used by ArgoCD to pull charts
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: coreason-oci-helm-creds
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: coreason
    app.kubernetes.io/component: secret-management
    argocd.argoproj.io/secret-type: repository
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: coreason-vault
    kind: ClusterSecretStore
  target:
    name: coreason-oci-helm-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: "helm"
        name: "coreason-charts"
        url: "ghcr.io/coreason-ai/charts"
        enableOCI: "true"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: coreason/oci-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: coreason/oci-credentials
        property: password
