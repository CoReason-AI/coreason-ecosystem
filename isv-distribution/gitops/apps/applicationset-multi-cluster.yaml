#               #   {{.name}}           — cluster display name (e.g. "us-east-prod")
#               #   {{.nameNormalized}} — K8s-safe name (e.g. "us-east-prod")
#               #   {{.server}}         — cluster API server URL
#               #   {{.metadata.labels.region}} — any cluster label
#
#           # Dimension 2: Which components?
#           - list:
#               elements:
