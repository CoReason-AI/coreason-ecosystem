# CoReason Platform — Multi-Cluster ApplicationSet (Cluster Generator)
# =====================================================================
#
# STATUS: SCAFFOLD — NOT ACTIVE
#
# This file documents the natural evolution path from single-cluster
# to multi-cluster (hub-spoke) deployments. It is NOT applied by
# default — customers activate it when they need fleet management.
#
# Architecture:
#
#   ┌──────────────────┐
#   │   Hub Cluster     │  ← ArgoCD management plane lives here
#   │   (argocd ns)     │
#   └────────┬─────────┘
#            │  Cluster Generator discovers spoke secrets
#            ├──────────────────────────────────┐
#   ┌────────▼─────────┐             ┌─────────▼────────┐
#   │  Spoke: US-East   │             │  Spoke: EU-West   │
#   │  (coreason-system) │             │  (coreason-system) │
#   └──────────────────┘             └──────────────────┘
#
# Prerequisites:
#   1. Register spoke clusters with ArgoCD:
#        argocd cluster add <context-name> --name us-east-prod
#   2. Label the cluster secret for filtering:
#        kubectl label secret <cluster-secret> -n argocd \
#          environment=production \
#          region=us-east \
#          coreason.ai/tier=enterprise
#   3. Replace the List generator in applicationset.yaml with this file
#
# How it works:
#   The Cluster Generator automatically discovers all clusters registered
#   in ArgoCD (stored as Secrets with label argocd.argoproj.io/secret-type=cluster).
#   It uses label selectors to filter which clusters get which components.
#   The {{nameNormalized}} template variable provides a K8s-safe cluster name.
#
# Activation:
#   1. Copy the generators block below into applicationset.yaml
#   2. Replace the existing List generator
#   3. Add cluster-specific values overrides in isv-distribution/gitops/values/<cluster>/
#   4. Push to release branch — ArgoCD auto-deploys to all matching clusters
#
# References:
#   - ArgoCD Cluster Generator: https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-Cluster/
#   - Matrix Generator (combine cluster + list): https://argo-cd.readthedocs.io/en/stable/operator-manual/applicationset/Generators-Matrix/
#
---
# Example: Cluster Generator with label-based filtering
#
# This deploys the full CoReason stack to every cluster labeled
# with coreason.ai/tier=enterprise AND environment=production.
#
