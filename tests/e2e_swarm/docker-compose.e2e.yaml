version: '3.9'

services:
  coreason-runtime:
    image: python:3.14-slim
    restart: on-failure
    command: ["python", "-m", "http.server", "8100"]
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8100:8100"
    networks:
      - e2e-mesh

  neo4j:
    image: python:3.14-slim
    restart: on-failure
    command: ["python", "-m", "http.server", "8107"]
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8107/')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e-mesh

  milvus:
    image: python:3.14-slim
    restart: on-failure
    command: ["python", "-m", "http.server", "8108"]
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8108/')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e-mesh

  vault:
    image: python:3.14-slim
    restart: on-failure
    command: ["python", "-m", "http.server", "8109"]
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8109/')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e-mesh

networks:
  e2e-mesh:
    internal: false
