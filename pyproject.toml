[project]
name = "coreason-workspace"
version = "0.1.0"
requires-python = ">=3.14"
description = "The CoReason AI Swarm Ecosystem - Global Workspace"
authors = [{ name = "Gowtham A Rao", email = "gowtham.rao@coreason.ai" }]
license = { file = "LICENSE" }

[tool.uv.workspace]
members = [
    "packages/*",
    "apps/*"
]

[tool.uv]
resolution = "highest"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.14.14",
    "mypy>=1.19.1",
    "pre-commit>=4.5.1",
    "deptry",
    "zensical",
    "pytest-cov>=7.0.0",
    "pytest-xdist>=3.8.0",
    "pytest-asyncio>=1.3.0",
]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "B", "I", "UP", "SIM", "RUF", "ARG", "C4", "PT", "TCH", "FA", "PIE", "RET", "PERF", "FURB", "LOG", "N", "A", "S"]
ignore = ["S101", "TC001", "TC002", "TC003", "UP037"]

[tool.mypy]
python_version = "3.14"
strict = true
disallow_untyped_defs = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
addopts = "-n auto --cov-report=term-missing --cov-report=html"
asyncio_mode = "auto"
